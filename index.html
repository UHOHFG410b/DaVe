<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body { display: flex; font-family: sans-serif; margin: 0; height: 100vh; }
    #canvas { flex: 1; border-right: 1px solid #ccc; }
    #details { width: 300px; padding: 20px; background: #f4f4f4; overflow-y: auto; }
    .prop { margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
    .label { font-weight: bold; font-size: 0.8em; color: #666; }
  </style>
</head>
<body>
  <div id="canvas"></div>
  <div id="details"><h3>Attribute</h3><p>Klicke ein Element an...</p></div>

<script src="https://unpkg.com/bpmn-js/dist/bpmn-navigated-viewer.development.js"></script>
<script>
  var viewer = new BpmnJS({ container: '#canvas' });

  fetch('QZBW_BIOZBW - Einzelzertifizierung - mit Genossenschaft - Alle Pools.bpmn').then(r => r.text()).then(xml => {
    viewer.importXML(xml).then(function() {
      viewer.get('canvas').zoom('fit-viewport');

      viewer.on('element.click', function(e) {
        var bo = e.element.businessObject;
        var details = document.getElementById('details');
        
        // Titel des Elements
        var html = '<h3>' + (bo.name || 'Element') + '</h3>';
        var hasContent = false;

        // 1. Suche in extensionElements nach Signavio-Metadaten
        if (bo.extensionElements && bo.extensionElements.values) {
          bo.extensionElements.values.forEach(function(ext) {
            // Wir suchen speziell nach signavio:signavioMetaData
            if (ext.$type === 'signavio:signavioMetaData' && ext.metaValue) {
              
              // Wir filtern unnötige Metadaten wie Farben oder IDs aus
              var key = ext.metaKey;
              var val = ext.metaValue;

              // Nur anzeigen, wenn es kein technischer Wert (wie Farben #...) 
              // und nicht leer (wie [""]) ist
              if (val.length > 5 && !val.startsWith('#') && key !== 'revisionid') {
                
                // Signavio packt Texte oft in ["..."] - das säubern wir hier
                var cleanVal = val.replace(/^\["| "\]$/g, '').replace(/\\"/g, '"');
                
                // Schöne Namen für die Keys vergeben
                var label = key.replace('meta-dctdescription', 'Beschreibung');
                
                html += '<div style="margin-bottom:15px;">';
                html += '<strong style="color:#0055aa; font-size:0.8em; text-transform:uppercase;">' + label + '</strong><br>';
                html += '<div style="background:white; padding:8px; border-radius:4px; border:1px solid #ddd;">' + cleanVal + '</div>';
                html += '</div>';
                hasContent = true;
              }
            }
          });
        }

        if (!hasContent) {
          html += '<p style="color:#999; font-style:italic;">Keine zusätzlichen Beschreibungen hinterlegt.</p>';
        }

        details.innerHTML = html;
      });
    });
  }).catch(err => console.error(err));
</script>
</body>
</html>
