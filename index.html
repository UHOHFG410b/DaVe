<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Projekt Abschlussbericht - BPMN</title>
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js/dist/assets/diagram-js.css" />
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js/dist/assets/bpmn-font/css/bpmn.css" />
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #canvas { 
      height: 80vh; /* Nutzt 80% der Bildschirmhöhe */
      width: 100%; 
      border: 1px solid #ccc; 
      border-radius: 8px;
      background-color: #fdfdfd;
    }
  </style>
</head>
<body>
  <h2>Interaktiver Projektprozess</h2>
  <div id="canvas"></div>

  <script src="https://unpkg.com/bpmn-js/dist/bpmn-navigated-viewer.development.js"></script>
  <script>
    var viewer = new BpmnJS({ container: '#canvas' });

    // Pfad zu deiner Datei auf GitHub (muss im gleichen Ordner liegen)
    fetch('Gesamt - Wein mit Genossenschaft (Kopie).bpmn')
      .then(response => response.text())
      .then(xml => {
        viewer.importXML(xml, function(err) {
          if (!err) {
            // Dies löst dein Problem mit dem "halben Diagramm":
            var canvas = viewer.get('canvas');
            canvas.zoom('fit-viewport', 'auto'); 
          }
        });
      })
      .catch(err => console.error('Ladefehler:', err));
  </script>
</body>
</html>
