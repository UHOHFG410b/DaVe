<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body { display: flex; font-family: sans-serif; margin: 0; height: 100vh; }
    #canvas { flex: 1; border-right: 1px solid #ccc; }
    #details { width: 300px; padding: 20px; background: #f4f4f4; overflow-y: auto; }
    .prop { margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
    .label { font-weight: bold; font-size: 0.8em; color: #666; }
  </style>
</head>
<body>
  <div id="canvas"></div>
  <div id="details"><h3>Attribute</h3><p>Klicke ein Element an...</p></div>

 <script src="https://unpkg.com/bpmn-js/dist/bpmn-navigated-viewer.development.js"></script>
<script>
  var viewer = new BpmnJS({ container: '#canvas' });

  // Falls du die Datei umbenannt hast, hier anpassen:
  var dateiName = 'QZBW_BIOZBW - Einzelzertifizierung - mit Genossenschaft - Alle Pools.bpmn'; 

  fetch(dateiName)
    .then(r => r.text())
    .then(xml => {
      // Wir nutzen die moderne Promise-Variante von importXML
      viewer.importXML(xml).then(function() {
        
        var canvas = viewer.get('canvas');
        
        // 1. Zuerst das Diagramm auf Standard-Zoom setzen
        canvas.zoom('fit-viewport', 'auto');
        
        // 2. Ein kleiner Trick: Falls es noch verschoben ist, 
        // zentrieren wir es nach 200ms nochmal sicherheitshalber
        setTimeout(function() {
          canvas.zoom('fit-viewport', 'auto');
        }, 200);

        // Klick-Event für deine Attribute (wie zuvor gewünscht)
        viewer.on('element.click', function(e) {
          var bo = e.element.businessObject;
          var details = document.getElementById('details');
          if (details) {
            var content = '<h3>' + (bo.name || 'Element') + '</h3>';
            // Zeigt alle Attribute an, die in Signavio befüllt wurden
            if (bo.documentation && bo.documentation[0]) {
               content += '<p><strong>Doku:</strong> ' + bo.documentation[0].text + '</p>';
            }
            // Hier kannst du weitere Attribute auslesen
            details.innerHTML = content;
          }
        });

      }).catch(function(err) {
        console.error('Fehler beim Rendern:', err);
      });
    })
    .catch(err => console.error('Ladefehler:', err));
</script>
</body>
</html>
