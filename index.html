<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>BPMN Projektbericht</title>
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js/dist/assets/diagram-js.css" />
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js/dist/assets/bpmn-font/css/bpmn.css" />
  <style>
    #canvas { height: 500px; width: 100%; border: 1px solid #ccc; background: #fafafa; }
    .error-msg { color: red; padding: 20px; font-family: sans-serif; }
  </style>
</head>
<body>
  <div id="canvas"></div>
  <script src="https://unpkg.com/bpmn-js/dist/bpmn-navigated-viewer.development.js"></script>
  <script>
    var viewer = new BpmnJS({ container: '#canvas' });

    // Prüfe hier EXAKT den Namen deiner Datei auf GitHub!
    var dateiName = 'prozess.bpmn'; 

    fetch(dateiName)
      .then(function(response) {
        if (!response.ok) {
          throw new Error('Die Datei "' + dateiName + '" wurde nicht gefunden. (Status: ' + response.status + ')');
        }
        return response.text();
      })
      .then(function(xml) {
        viewer.importXML(xml, function(err) {
          if (err) {
            document.body.innerHTML += '<div class="error-msg">Fehler beim Einlesen des BPMN-Codes: ' + err + '</div>';
          } else {
            viewer.get('canvas').zoom('fit-viewport');
          }
        });
      })
      .catch(function(err) {
        document.body.innerHTML += '<div class="error-msg">Ladefehler: ' + err.message + '</div>';
      });
  </script>
</body>
</html>
